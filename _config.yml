title: graypanda #Your awesome title
email: annabellee123456@outlook.com
description: > # this means to ignore newlines until "baseurl"
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.

baseurl:  # the subpath of the site
url: https://1nzag.github.io # the base hostname & protocol for your site

permalink: /:year-:month/:title
timezone: GMT+1

favicon: /assets/img/favicon.ico

google_analytics: #UA—XXXXXXXX-X
disqus_shortname: #disqus shortname
cusdis:
    app_id: #your cusdis app_id

user:
  name: 1nzag (graypanda)
  pic: /assets/img/profile.png
  picAlt: "An Exhibition of A Hunger Artist"
  job: Security researcher
  # aboutme: true # comment this out if you don't need the 'about' page.

exclude:
  - README.md
  - LICENSE
  - github

defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      comment: true   

collections:
  additional_pages:
    output: true
  ctf:
    output: true
  study:
    output: true
  literature:
    output: true
  others:
    output: true

plugins:
  - jekyll-mermaid
  - jekyll-seo-tag
  - jekyll-sitemap
gems:
  - jekyll-mermaid
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO Verification
google_site_verification: "lDMQiQkm1EKibvhaanJKZlz0eJbk4GLexWJwXQcxRds"
naver_site_verification: "a23abdb578788d6bb25ddb4aa4942a6a0face5c2"

markdown_ext: "markdown,mkdown,mkdn,mkd,md"
markdown: kramdown 

# Filtering Content
show_drafts: null
limit_posts: 0
future:      false
unpublished: false
